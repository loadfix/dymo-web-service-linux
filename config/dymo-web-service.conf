# DYMO Web Service config (read by systemd via EnvironmentFile=)
#
# These mirror the CLI flags; set whichever you need. Defaults shown.

# Bind address. 127.0.0.1 is the only safe value — the service has NO
# authentication and any host that can reach it can print labels. To
# expose on the LAN anyway, set DYMO_BIND=0.0.0.0 AND DYMO_ALLOW_LAN=1
# (without the second flag the daemon refuses to start). You should also
# tighten IPAddressAllow in a systemd drop-in when doing this.
DYMO_BIND=127.0.0.1
#DYMO_ALLOW_LAN=1

# Ports. The DYMO JS framework probes 41951–41960; 41952 is the default HTTPS.
DYMO_HTTP_PORT=41951
DYMO_HTTPS_PORT=41952

# TLS cert + key. The postinst generates these automatically if they're
# missing on first install.
DYMO_CERT=/etc/dymo-web-service/cert.pem
DYMO_KEY=/etc/dymo-web-service/key.pem

# CUPS printer destination (as shown by `lpstat -p`).
DYMO_PRINTER=LabelWriter-450-Turbo

# Name the browser sees in its printer list.
DYMO_REPORTED_NAME=DYMO LabelWriter 450 Turbo

# CORS allowlist: comma-separated origins that may call the API from a
# browser. A request from any other origin gets no CORS response headers,
# so the browser blocks the response. Default: just CellarTracker.
DYMO_ALLOWED_ORIGINS=https://www.cellartracker.com

# Hard cap on POST body size; bigger requests get 413. A normal label
# payload is well under 50 KiB; the default leaves plenty of headroom.
DYMO_MAX_BODY_BYTES=262144

# Where captured PrintLabel payloads land. Useful for debugging.
DYMO_LOG_DIR=/var/log/dymo-web-service
